name: covaone_sdk
description: Covaone Flutter SDK — customer support chat with session management, real-time messaging, broadcasts, FAQs, and WebRTC call support.
version: 1.0.0
homepage:

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Legacy layer (covaone_sdk / Covaone facade) ─────────────────────────────
  plugin_platform_interface: ^2.0.2
  modal_bottom_sheet: ^3.0.0
  http: ^1.2.2
  provider: ^6.0.3
  # flutter_secure_storage: ^8.0.0
  flutter_secure_storage: ^10.3.1
  webview_flutter: ^4.2.2

  # ── BLoC architecture ─────────────────────────────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.7.0

  # ── Local storage ─────────────────────────────────────────────────────────
  shared_preferences: ^2.3.3

  # ── Real-time / WebSocket ─────────────────────────────────────────────────
  socket_io_client: ^2.0.3+1

  # ── UI helpers ────────────────────────────────────────────────────────────
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  flutter_html: ^3.0.0-beta.2

  # ── File & media handling ─────────────────────────────────────────────────
  file_picker: ^8.1.2
  image_picker: ^1.1.2

  # ── Audio & calling ───────────────────────────────────────────────────────
  just_audio: ^0.9.42
  flutter_webrtc: ^0.11.7

  # ── Utilities ─────────────────────────────────────────────────────────────
  get_it: ^9.2.1
  uuid: ^4.5.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  audio_session: ^0.1.25

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' specifies the class (in Java, Kotlin, Swift, Objective-C, etc.)
  # which should be registered in the plugin registry. This is required for
  # using method channels.
  # The Android 'package' specifies package in which the registered class is.
  # This is required for using method channels on Android.
  # The 'ffiPlugin' specifies that native code should be built and bundled.
  # This is required for using `dart:ffi`.
  # All these are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      android:
        package: com.covaone.covaone_sdk
        pluginClass: CovaoneSdkPlugin
      ios:
        pluginClass: CovaoneSdkPlugin


  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' and Android 'package' identifiers should not ordinarily
  # be modified. They are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  assets:
    - packages/covaone_sdk/assets/file/bimbo.png
    - packages/covaone_sdk/assets/file/ola.png
    - packages/covaone_sdk/assets/file/tola.jpeg
    # ── Audio assets used by AudioService ─────────────────────────────────
    # TODO: Place a freely-licensed short chime MP3 at assets/audio/notification.mp3
    # TODO: Place a freely-licensed ringtone MP3 at assets/audio/ringtone.mp3
    - assets/audio/notification.mp3
    - assets/audio/ringtone.mp3

  fonts:
    - family: Circular
      fonts:
        - asset: packages/covaone_sdk/assets/CircularStd-Book.ttf
          weight: 400
        - asset: packages/covaone_sdk/assets/CircularStd-Book.ttf
          weight: 500
        - asset: packages/covaone_sdk/assets/CircularStd-Bold.ttf
          weight: 600
        - asset: packages/covaone_sdk/assets/CircularStd-Bold.ttf
          weight: 700
        - asset: packages/covaone_sdk/assets/CircularStd-Bold.ttf
          weight: 800
        - asset: packages/covaone_sdk/assets/CircularStd-Bold.ttf
          weight: 900
